name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate docs content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Validate content (paths, frontmatter, orphans)
        run: node scripts/validate-docs.mjs

  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check output
        run: |
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          test -f dist/guides/translation-status/index.html || { echo "translation status page missing"; exit 1; }
          echo "Built $(find dist -name 'index.html' | wc -l) pages"

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          retention-days: 7
